name: release-please

on:
  push:
    branches:
      - main
    paths:
      - "lfg.*"
      - "functions/**"
      - "completions/**"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Build release archive
        if: ${{ steps.release.outputs.release_created }}
        run: scripts/release.sh "${{ steps.release.outputs.version }}"

      - name: Upload release archive
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" "dist/lfg-${{ steps.release.outputs.version }}.zip" --clobber
