name: release-please

on:
  push:
    branches:
      - main
    paths:
      - "lfg.*"
      - "functions/**"
      - "completions/**"

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Build release archive
        if: ${{ steps.release.outputs.release_created }}
        run: scripts/release.sh "${{ steps.release.outputs.version }}"

      - name: Upload release archive
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" "dist/lfg-${{ steps.release.outputs.version }}.tar.gz" --clobber

      - name: Build latest release archive
        if: ${{ steps.release.outputs.release_created }}
        run: scripts/release.sh latest

      - name: Update latest tag and release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_sha="$(git rev-parse "${{ steps.release.outputs.tag_name }}^{commit}")"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$release_sha"
          git push -f origin latest

          gh release delete latest -y || true
          gh release create latest \
            --target "$release_sha" \
            --title "Latest" \
            --notes "Pointer to the latest release. See [${{ steps.release.outputs.tag_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag_name }}) for release notes." \
            --latest=false \
            dist/lfg-latest.tar.gz
