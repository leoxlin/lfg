name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh fish

      - name: Lint
        run: scripts/lint.sh

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install shells
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Install fzf
        run: |
          sudo apt-get install -y fzf

      - name: Run runtime tests
        run: tests/test-lfg.sh

      - name: Run install tests
        run: tests/test-install.sh
